name: CI
on:
  pull_request:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - run: sbt scalafmtCheckAll mimaReportBinaryIssues test

  # The Rift adapter's real-container acceptance test (#113) is gated by RIFT_IT
  # so the hermetic `build` job above stays Docker-free. ubuntu-latest ships a
  # running Docker daemon at /var/run/docker.sock that testcontainers resolves
  # natively, so Rift.managed() can stand up the published image here. (Docker
  # Desktop on macOS is not auto-resolvable, which is why this can't run as part
  # of the default unit gate.)
  rift-it:
    name: Rift integration test (real container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
          cache: sbt
      - uses: sbt/setup-sbt@v1
      # Every RIFT_IT-gated suite against a real container: the Rift adapter
      # acceptance (#113) plus the whole conformance module's Rift column — the
      # matrix (#124/#125) and the parallel-isolation contract (#126) only
      # exercise Rift when RIFT_IT is set (dead in the hermetic `build` job above).
      # (The Rift unmatched-request-default bug that previously failed the matrix
      # column is fixed in #165, so the full module runs green here.)
      - name: Real-container suites (RiftContainerSpec + RiftInterceptSpec + conformance Rift column)
        env:
          RIFT_IT: "1"
        run: sbt "rift/testOnly zio.bdd.mock.rift.RiftContainerSpec zio.bdd.mock.rift.RiftInterceptSpec" "conformance/test"

  # The embedded provider (#133/#193) drives Rift in-process over librift_ffi via the stable Panama
  # FFM API (JEP 454), finalized in JDK 22. It ships as a separate `zio-bdd-rift-embedded` artifact
  # requiring JDK 22+, so it's aggregated only on a 22+ JDK and exercised here on a JDK 22 runner
  # (validating the minimum supported JDK). No Docker: the in-process engine binds localhost ports.
  # The librift_ffi cdylibs are bundled by the zio-bdd-rift-embedded-natives jar (a test dep of the
  # embedded suites), downloaded + checksum-verified by its resourceGenerator; the loader extracts +
  # loads the host's lib from the classpath out-of-the-box — no -Drift.ffi.lib. librift_ffi dynamically
  # links LuaJIT, so it must be installed to dlopen the library (matches Rift's own FFI CI).
  embedded-stable:
    name: Embedded FFM provider — stable (JDK 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 22
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Install LuaJIT
        run: sudo apt-get update && sudo apt-get install -y libluajit-5.1-dev
      # Stable FFM needs no --enable-preview; the forked test JVM runs with --enable-native-access only.
      - name: Stable embedded tests + portable conformance
        run: >-
          sbt
          "riftEmbedded/test"
          "conformance/testOnly zio.bdd.mock.conformance.EmbeddedConformanceSpec"

  # The JDK-21 preview variant (zio-bdd-rift-embedded-jdk21): same sources, FFM as a preview API, so the
  # forked test JVM runs with --enable-preview + --enable-native-access. On JDK 21 the root aggregates
  # only this variant, so it is driven explicitly.
  embedded-preview:
    name: Embedded FFM provider — preview (JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Install LuaJIT
        run: sudo apt-get update && sudo apt-get install -y libluajit-5.1-dev
      - name: Preview embedded tests
        run: sbt "riftEmbedded21/test"
      # The point of the -jdk21 cut is to load on JDK 21, where FFM is preview (class <= 65). Guard
      # against a regression to class 66 (Java 22), which shipped in 1.3.1 (#247) and would break the
      # documented JDK-21 + --enable-preview path.
      - name: Assert the JDK-21 bridge is class <= 65
        run: |
          bridges=$(find rift-embedded-jdk21/target -name RiftFfiBridge.class)
          count=$(printf '%s' "$bridges" | grep -c . || true)
          if [ "$count" -ne 1 ]; then
            echo "::error::expected exactly one RiftFfiBridge.class under rift-embedded-jdk21/target, found $count"
            exit 1
          fi
          bash scripts/assert-class-max-version.sh "$bridges" 65
