name: CI
on:
  pull_request:
  push:
    branches: [master]
jobs:
  # #285 moved the `rift` module's JDK floor 11 -> 17 (its SDK dependency links rift-java-core, JDK-17
  # bytecode) — every other module stays 11 (see `javaFloorSettings` vs `javaFloor17Settings` in
  # build.sbt). `rift/test` itself is safe here: the embedded provider (`rift-java-embedded`, JDK-22
  # bytecode) is a Test-scope dep, and `EmbeddedRift.available` degrades to false — not a crash — when
  # its provider class can't classload on this JDK (a JDK < 22 `ServiceLoader` lookup would otherwise
  # throw `UnsupportedClassVersionError`, caught inside `available`). So the embedded-touching specs
  # SKIP gracefully here; the `embedded` job below is what actually exercises them.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - run: sbt scalafmtCheckAll mimaReportBinaryIssues test
      # Gate the artifact (#331): zio-bdd-mock-conformance's bundled adapters (rift, wiremock) must
      # stay Test-scope in the published POM. Runs on every build now (not JDK-gated, #285 dropped the
      # stableFfm branching that used to make this conditional) — MIMA is a no-op for the module, so
      # this POM inspection is the only guard against a future `.dependsOn(<adapter>)` that forgets `% Test`.
      - name: Assert the conformance POM compile scope is SPI-only
        run: |
          sbt "conformance/makePom"
          pom=$(find conformance/target -name "zio-bdd-mock-conformance_3-*.pom")
          count=$(printf '%s' "$pom" | grep -c . || true)
          if [ "$count" -ne 1 ]; then
            echo "::error::expected exactly one conformance POM under conformance/target, found $count"
            exit 1
          fi
          bash scripts/assert-pom-compile-scope.sh "$pom" io.github.etacassiopeia zio-bdd-mock

  # Compile-check the canonical doc snippets (#283): `docs/mdoc` compiles every `scala mdoc` block in
  # mdoc-src/ against the real API (so an API change that breaks a documented example fails CI here) and
  # regenerates docs/verified-examples.md; the diff check then fails if the committed output is stale.
  docs:
    name: Docs — mdoc verified examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Mock docs contract (pages, links, version coherence)
        run: bash scripts/check-mock-docs.sh
      - run: sbt docs/mdoc
      - name: Fail if docs/verified-examples.md is out of date (run `sbt docs/mdoc`)
        run: git diff --exit-code docs/verified-examples.md

  # The Rift adapter's real-container acceptance test (#113) is gated by RIFT_IT
  # so the hermetic `build` job above stays Docker-free. ubuntu-latest ships a
  # running Docker daemon at /var/run/docker.sock that testcontainers resolves
  # natively, so Rift.managed() can stand up the published image here. (Docker
  # Desktop on macOS is not auto-resolvable, which is why this can't run as part
  # of the default unit gate.)
  rift-it:
    name: Rift integration test (real container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      # Every RIFT_IT-gated suite against a real container: the Rift adapter
      # acceptance (#113) plus the whole conformance module's Rift column — the
      # matrix (#124/#125) and the parallel-isolation contract (#126) only
      # exercise Rift when RIFT_IT is set (dead in the hermetic `build` job above).
      # (The Rift unmatched-request-default bug that previously failed the matrix
      # column is fixed in #165, so the full module runs green here.)
      - name: Real-container suites (RiftContainerSpec + RiftInterceptSpec + conformance Rift column)
        env:
          RIFT_IT: "1"
        run: sbt "rift/testOnly zio.bdd.mock.rift.RiftContainerSpec zio.bdd.mock.rift.RiftInterceptSpec" "conformance/test"

  # #285 collapsed the embedded provider into the single `zio-bdd-rift` artifact: `rift-java-embedded`
  # (the SDK's runtime ServiceLoader provider, added at Test scope in build.sbt) needs the STABLE
  # Panama FFM API (JEP 454), finalized in JDK 22 — so this job runs on the minimum supported JDK (22)
  # to actually exercise `EmbeddedRift`-backed suites, which the `build` job's JDK 17 gracefully skips
  # (see the comment on `build` above). There is no more JDK-21-preview variant to drive separately —
  # `rift-java-embedded` never targeted preview FFM, only the OLD hand-rolled bridge did. No Docker:
  # the in-process engine binds localhost ports. The `rift-java-natives` classifier jar (an ordinary
  # runtime dependency now, not a downloaded/checksummed asset this build packages itself) supplies
  # the native library for whichever platform the runner is on.
  embedded:
    name: Embedded provider (JDK 22, minimum supported)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 22
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Embedded-backed suites + portable conformance
        run: sbt "rift/test" "conformance/testOnly zio.bdd.mock.conformance.EmbeddedConformanceSpec"
