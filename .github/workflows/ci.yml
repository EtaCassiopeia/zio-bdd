name: CI
on:
  pull_request:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - run: sbt scalafmtCheckAll mimaReportBinaryIssues test

  # The Rift adapter's real-container acceptance test (#113) is gated by RIFT_IT
  # so the hermetic `build` job above stays Docker-free. ubuntu-latest ships a
  # running Docker daemon at /var/run/docker.sock that testcontainers resolves
  # natively, so Rift.managed() can stand up the published image here. (Docker
  # Desktop on macOS is not auto-resolvable, which is why this can't run as part
  # of the default unit gate.)
  rift-it:
    name: Rift integration test (real container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
          cache: sbt
      - uses: sbt/setup-sbt@v1
      # Run every RIFT_IT-gated suite against a real container: the Rift adapter
      # acceptance (#113) plus the conformance module's Rift column — the matrix
      # (#124/#125) and the parallel-isolation contract (#126) only exercise Rift
      # when RIFT_IT is set, so they are dead in the hermetic `build` job above.
      - name: Real-container suites (RiftContainerSpec + conformance Rift column)
        env:
          RIFT_IT: "1"
        run: sbt "rift/testOnly zio.bdd.mock.rift.RiftContainerSpec" "conformance/test"
