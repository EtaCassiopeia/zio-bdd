name: Release
on:
  push:
    tags: ["*"]
jobs:
  # Gate the whole release on a signed tag (every `publish*` job needs this): the tag object must carry
  # a good signature from a key in .github/release-signing-keys.asc — the committed public half of the
  # maintainer release key. An unsigned tag, a lightweight tag (no signature), or a tag signed by an
  # unknown key fails here, before anything is published to Maven Central. To add or rotate a signer,
  # append their ASCII-armored PUBLIC key to that file. (v1.4.0/v1.4.1 shipped from unsigned tags because
  # nothing checked this; git verify-tag exits non-zero unless a trusted key in the keyring validates it.)
  verify-tag-signature:
    name: Require a signed release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Import trusted release-signing public keys
        run: gpg --batch --import .github/release-signing-keys.asc
      - name: Verify the tag is signed by a trusted key
        run: |
          if ! git verify-tag --raw "$GITHUB_REF_NAME" 2>gpgstatus.txt; then
            echo "::error::tag $GITHUB_REF_NAME is not signed by a trusted release key — refusing to publish"
            cat gpgstatus.txt
            exit 1
          fi
          # Belt-and-suspenders: a good signature from an *available* key emits VALIDSIG. Guards against a
          # future git that might exit 0 on a warning-only path.
          if ! grep -q '^\[GNUPG:\] VALIDSIG' gpgstatus.txt; then
            echo "::error::no valid signature found on $GITHUB_REF_NAME"
            cat gpgstatus.txt
            exit 1
          fi

  # Stable job (JDK 22): FFM is finalized in JDK 22 (JEP 454), so on a 22+ JDK the root aggregates the
  # full stack + the stable embedded provider (zio-bdd-rift-embedded) + the natives jar — one standard
  # `ci-release` publishes them all. The container/core modules stay portable (scalac emits Java 8
  # bytecode regardless of the build JDK; the JDK-11 CI `build` job guards their JDK-11 API compat).
  publish:
    needs: verify-tag-signature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 22
          cache: sbt
      - uses: sbt/setup-sbt@v1
      # Gate the artifact BEFORE publishing (#331): the JDK-22 job is the one that publishes
      # zio-bdd-mock-conformance, and stableFfm (>= 22) is what adds its rift-embedded deps, so this is
      # the build where an adapter could leak into the compile scope. MIMA is a no-op for the module, so
      # this POM inspection is the last line of defense — a leak that lands on master still can't publish.
      - name: Assert the conformance POM compile scope is SPI-only before publishing
        run: |
          sbt "conformance/makePom"
          pom=$(find conformance/target -name "zio-bdd-mock-conformance_3-*.pom")
          count=$(printf '%s' "$pom" | grep -c . || true)
          if [ "$count" -ne 1 ]; then
            echo "::error::expected exactly one conformance POM under conformance/target, found $count"
            exit 1
          fi
          bash scripts/assert-pom-compile-scope.sh "$pom" io.github.etacassiopeia zio-bdd-mock
      - run: sbt ci-release
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}

  # Preview job (JDK 21): the JDK-21 preview variant (zio-bdd-rift-embedded-jdk21) is a preview-compiled
  # class that can only be built on JDK 21. On JDK 21 the root aggregates ONLY that variant, so the same
  # standard `ci-release` publishes exactly it (its rift/mock/natives deps are compiled but not published
  # here — they ship from the stable job). Runs after `publish` so the two Sonatype bundles don't race.
  publish-preview:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt
      - uses: sbt/setup-sbt@v1
      # Gate the artifact BEFORE publishing: the -jdk21 cut must be class <= 65 so it loads on JDK 21.
      # v1.3.1 published it as class 66 (#247); this check would have caught that.
      - name: Assert the JDK-21 bridge is class <= 65 before publishing
        run: |
          sbt "riftEmbedded21/Compile/compile"
          bridges=$(find rift-embedded-jdk21/target -name RiftFfiBridge.class)
          count=$(printf '%s' "$bridges" | grep -c . || true)
          if [ "$count" -ne 1 ]; then
            echo "::error::expected exactly one RiftFfiBridge.class under rift-embedded-jdk21/target, found $count"
            exit 1
          fi
          bash scripts/assert-class-max-version.sh "$bridges" 65
      - run: sbt ci-release
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}

  # GitHub Release object (the "Releases" page): `ci-release` only publishes to Maven Central, so without
  # this step a pushed tag never appears under Releases (only under Tags). Runs after both Sonatype bundles
  # succeed, so a failed publish never yields a Release. A pre-release tag (contains a hyphen, e.g. v1.0.0-RC1)
  # is flagged --prerelease (never marked Latest); a plain vX.Y.Z is marked --latest. Notes are auto-generated
  # from the merged PRs since the previous release.
  github-release:
    needs: [publish, publish-preview]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create the GitHub Release for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flags="--verify-tag --generate-notes"
          case "${GITHUB_REF_NAME}" in
            *-*) flags="$flags --prerelease" ;;
            *) flags="$flags --latest" ;;
          esac
          gh release create "${GITHUB_REF_NAME}" $flags

  # Keep the docs/README install snippets from lagging a published tag: bump them to the released version
  # and open a PR. A PR (not a direct push) respects branch protection; the change is docs-only. No-op when
  # the docs already carry this version. Note: a bot-opened PR does not re-trigger CI, so a maintainer merges
  # it (admin merge is fine — docs-only). Skipped for pre-releases, which don't move the "current version".
  docs-version-bump:
    needs: github-release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
      - name: Open a docs version-bump PR for this release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash scripts/bump-doc-versions.sh "$version"
          if git diff --quiet; then
            echo "docs already at $version — nothing to bump"
            exit 0
          fi
          branch="docs/bump-${version}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git commit -am "docs: bump install snippets to ${version}"
          git push -u origin "$branch"
          gh pr create --base master --head "$branch" \
            --title "docs: bump install snippets to ${version}" \
            --body "Automated by the release workflow — sync the README/docs install snippets to the freshly-published \`${version}\`. Docs-only; safe to admin-merge (a bot-opened PR does not re-trigger CI)."
