name: Build and Publish Scala Artifact

on:
  push:
    tags:
      - "v*.*.*" # Trigger on version tags (e.g., v0.1.0)

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "sbt"

      - name: Install sbt
        uses: coursier/setup-action@v1
        with:
          apps: sbt

      - name: Build and Test
        run: sbt test

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "sbt"

      - name: Install sbt
        uses: coursier/setup-action@v1
        with:
          apps: sbt

      - name: Set up GPG
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.PGP_SECRET }}
          passphrase: ${{ secrets.PGP_PASSPHRASE }}
          git_user_signingkey: false
          git_commit_gpgsign: false

      - name: Verify GPG Key
        run: |
          gpg --list-secret-keys --keyid-format LONG
          gpg --list-keys
          echo "GPG version:"
          gpg --version

      - name: Export Public Key for Debugging
        run: |
          mkdir -p debug
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep 'sec' | head -1 | awk '{print $2}' | cut -d'/' -f2)
          gpg --armor --export $KEY_ID > debug/public-key.asc
        continue-on-error: true

      - name: Set Git Identity
        run: |
          git config --global user.email "zainalpour@yahoo.com"
          git config --global user.name "Mohsen Zainalpour"

      - name: Configure SBT GPG Signing
        run: |
          mkdir -p ~/.sbt/gpg
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "passphrase: ${{ secrets.PGP_PASSPHRASE }}" > ~/.sbt/gpg/sbt-signing.gpg
          echo "[gpg]" >> ~/.sbt/gpg/sbt-signing.gpg
          echo "  program = gpg" >> ~/.sbt/gpg/sbt-signing.gpg

      - name: Publish to Sonatype
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: |
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep 'sec' | head -1 | awk '{print $2}' | cut -d'/' -f2)
          if [ -z "$KEY_ID" ]; then
            echo "Error: Could not find GPG key ID"
            exit 1
          fi
          echo "Using GPG Key: $KEY_ID"
          sbt -Dsbt.global.base=/tmp/.sbt \
              -Dsbt.ivy.home=/tmp/.ivy2 \
              "set Global / pgpPassphrase := Some(\"${{ secrets.PGP_PASSPHRASE }}\".toCharArray)" \
              "set Global / pgpSigningKey := Some(\"$KEY_ID\")" \
              publishSigned \
              sonatypeBundleRelease
        continue-on-error: false

      - name: Verify Signatures (Debugging)
        if: always()
        run: |
          echo "Listing generated artifacts and signatures..."
          find target/sonatype-staging -type f
          echo "Verifying signatures..."
          for file in $(find target/sonatype-staging -type f -name "*.asc"); do
            echo "Verifying $file"
            artifact=${file%.asc}
            gpg --verify $file $artifact || echo "Failed to verify $artifact"
          done
        continue-on-error: true

      - name: Log Failure Details (if any)
        if: failure()
        run: |
          echo "Publishing failed. Check logs above for details."
          echo "GPG configuration:"
          cat ~/.gnupg/gpg.conf || echo "No gpg.conf found"
          cat ~/.gnupg/gpg-agent.conf || echo "No gpg-agent.conf found"
          echo "GPG keys:"
          gpg --list-keys || echo "Failed to list keys"
          gpg --list-secret-keys || echo "Failed to list secret keys"
          echo "SBT logs (if available):"
          find . -name "*.log" -exec cat {} \; || echo "No SBT logs found"
          echo "Public key (for debugging):"
          cat debug/public-key.asc || echo "No public key exported"