name: Build and Publish Scala Artifact

on:
  push:
    tags:
      - "v*.*.*" # Trigger on version tags (e.g., v0.1.0)

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "sbt"

      - name: Install sbt
        uses: coursier/setup-action@v1
        with:
          apps: sbt

      - name: Build and Test
        run: sbt test

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "sbt"

      - name: Install sbt
        uses: coursier/setup-action@v1
        with:
          apps: sbt

      - name: Set up GPG
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.PGP_SECRET }}
          passphrase: ${{ secrets.PGP_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: false

      - name: Verify GPG Key
        run: |
          gpg --list-secret-keys --keyid-format LONG
          gpg --list-keys

      - name: Set Git Identity
        run: |
          git config --global user.email "zainalpour@yahoo.com"
          git config --global user.name "Mohsen Zainalpour"

      - name: Publish to Sonatype
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: |
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep 'sec' | head -1 | awk '{print $2}' | cut -d'/' -f2)
          if [ -z "$KEY_ID" ]; then
            echo "Error: Could not find GPG key ID"
            exit 1
          fi
          echo "Using GPG Key: $KEY_ID"
          sbt -Dsbt.global.base=/tmp/.sbt \
              -Dsbt.ivy.home=/tmp/.ivy2 \
              -Dgpg.keyId=$KEY_ID \
              -Dgpg.passphrase="${{ secrets.PGP_PASSPHRASE }}" \
              publishSigned \
              sonatypeBundleRelease
        continue-on-error: false

      - name: Log Failure Details (if any)
        if: failure()
        run: |
          echo "Publishing failed. Check logs above for details."
          echo "GPG configuration:"
          cat ~/.gnupg/gpg.conf || echo "No gpg.conf found"
          cat ~/.gnupg/gpg-agent.conf || echo "No gpg-agent.conf found"
          echo "GPG keys:"
          gpg --list-keys || echo "Failed to list keys"
          gpg --list-secret-keys || echo "Failed to list secret keys"
          echo "SBT logs (if available):"
          find . -name "*.log" -exec cat {} \; || echo "No SBT logs found"