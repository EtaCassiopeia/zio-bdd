name: Publish to Sonatype Central

on:
  push:
    tags:
      - 'v*.*.*' # Trigger on version tags like v1.0.0

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - uses: actions/checkout@v4

      # Step 2: Set up JDK (use a compatible version for your Scala project)
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'sbt'

      # Step 3: Set up GPG for signing
      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_KEY }}" | gpg --import --batch --yes
        env:
          GPG_KEY: ${{ secrets.GPG_KEY }}

      # Step 4: Build and publish to Sonatype
      - name: Publish to Sonatype
        run: |
          sbt -Dsbt.sonatype.credentials="${{ secrets.SONATYPE_USERNAME }}:${{ secrets.SONATYPE_PASSWORD }}" \
              -Dgpg.passphrase="${{ secrets.GPG_PASSPHRASE }}" \
              publishSigned sonatypeBundleRelease
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}